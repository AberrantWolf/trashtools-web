<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="rust" cx="12%" cy="6%" r="70%">
      <stop offset="0%" stop-color="#c0531f" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#c0531f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="teal" cx="92%" cy="96%" r="65%">
      <stop offset="0%" stop-color="#2c6c5b" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#2c6c5b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- salvaged paper -->
  <rect width="1200" height="630" fill="#f1ead9"/>
  <rect width="1200" height="630" fill="url(#rust)"/>
  <rect width="1200" height="630" fill="url(#teal)"/>

  <!-- industrial dashed frame -->
  <rect x="28" y="28" width="1144" height="574" rx="22"
        fill="none" stroke="#211b14" stroke-opacity="0.22"
        stroke-width="2" stroke-dasharray="2 9" stroke-linecap="round"/>
  <!-- rust spine, like the cards -->
  <rect x="28" y="28" width="8" height="574" rx="4" fill="#c0531f"/>

  <!-- faint drifting debris (echoes the hero) -->
  <g stroke-width="2" fill="none">
    <polygon points="930,150 968,168 962,210 924,206" stroke="#c0531f" stroke-opacity="0.30"/>
    <circle cx="1080" cy="300" r="22" stroke="#2c6c5b" stroke-opacity="0.28"/>
    <polygon points="1010,470 1040,470 1052,500 1028,520 1000,500" stroke="#e7b21c" stroke-opacity="0.45"/>
    <polygon points="880,420 910,432 902,462 872,452" stroke="#2c6c5b" stroke-opacity="0.22"/>
    <rect x="1108" y="150" width="34" height="34" stroke="#c0531f" stroke-opacity="0.18" transform="rotate(18 1125 167)"/>
  </g>

  <!-- salvage crate mark, top-right -->
  <g transform="translate(986 70) scale(2.45)">
    <path d="M16 26 h32 l-3 26 a4 4 0 0 1-4 3.4 H23 a4 4 0 0 1-4-3.4 Z" fill="#c0531f"/>
    <rect x="13" y="20" width="38" height="7" rx="3" fill="#e3743c"/>
    <path d="M26 20 v-3 a6 4 0 0 1 12 0 v3" fill="none" stroke="#e3743c" stroke-width="3"/>
    <g fill="#e7b21c">
      <path d="M23 30 l4 0 -5 20 -3.6 0 Z"/>
      <path d="M31 30 l4 0 -3.4 22 -3.8 0 Z"/>
      <path d="M39 30 l4 0 -2 22 -3.8 0 Z"/>
    </g>
    <path d="M44 11 l2 5 5 2 -5 2 -2 5 -2-5 -5-2 5-2 Z" fill="#46a187"/>
  </g>

  <!-- hazard tape eyebrow -->
  <g transform="translate(84 150) rotate(-2)">
    <rect x="0" y="-27" width="452" height="38" fill="#e7b21c"/>
    <text x="18" y="-2" font-family="JetBrains Mono" font-weight="700"
          font-size="16" letter-spacing="3.5" fill="#6b4e00">EST. 2026 · BUILT WITH ROBOTS</text>
  </g>

  <!-- wordmark -->
  <g font-family="Bricolage Grotesque ExtraBold, Bricolage Grotesque" font-weight="800">
    <text x="80" y="332" font-size="172" letter-spacing="-5" fill="#211b14">TRASH</text>
    <text x="80" y="486" font-size="172" letter-spacing="-5" fill="#c0531f">TOOLS</text>
  </g>

  <!-- tagline -->
  <text x="86" y="548" font-family="JetBrains Mono" font-weight="700" font-size="27" fill="#4f463a">stuff i made with robots.</text>

  <!-- url -->
  <text x="1144" y="585" text-anchor="end" font-family="JetBrains Mono" font-weight="700"
        font-size="26" fill="#8f3c14">trashtools.net</text>
</svg>
